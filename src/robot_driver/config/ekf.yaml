ekf_filter_node:
  ros__parameters:

    frequency: 30.0
    sensor_timeout: 0.1

    two_d_mode: true

    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Encoder odom
    odom0: /wheel/odom

    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]

    odom0_differential: false

    # RF2O odom
    odom1: /rf2o/odom

    odom1_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]

    odom1_differential: false